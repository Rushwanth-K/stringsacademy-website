<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enroll – StringsAcademy</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet" />

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Tailwind Config: same colors as index.html -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gold:         '#c8922a',
            'gold-light': '#e5b55a',
            dark:         '#1a1209',
            'dark-2':     '#261c0e',
            'dark-3':     '#321f0f',
            muted:        '#9e8c72',
            border:       '#3a2a18',
          },
          fontFamily: {
            heading: ['Playfair Display', 'serif'],
            body:    ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>

<body class="bg-[#1a1209] min-h-screen flex flex-col items-center
             justify-center px-6 py-12 font-body">

  <!-- Back to Home -->
  <a href="index.html"
     class="inline-flex items-center gap-2 text-muted text-sm
            mb-8 hover:text-gold transition-colors duration-200">
    ← Back to Home
  </a>

  <!-- Enrollment Card -->
  <div class="bg-[#261c0e] border border-[#3a2a18] rounded-2xl
              p-10 w-full max-w-[520px]">

    <!-- Header -->
    <div class="text-center mb-8">
      <p class="font-heading text-2xl font-bold text-[#f0e8d8] mb-1">
        Strings<span class="text-gold">Academy</span>
      </p>
      <p class="text-muted text-sm">
        Fill the form below to reserve your seat
      </p>
    </div>

    <!-- Divider -->
    <hr class="border-none border-t border-[#3a2a18] mb-8"
        style="border-top: 1px solid #3a2a18;" />

    <!-- Enrollment Form -->
    <form action="https://formspree.io/f/xykbvwzq" method="POST">

      <input type="hidden" name="_subject" value="New Form Submission - StringsAcademy" />
      <input type="hidden" name="formName" value="Enroll Form" />

      <!-- Name + Phone (2 columns) -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">

        <div class="flex flex-col gap-1.5">
          <label for="e-name"
                 class="text-xs font-semibold text-muted">
            Full Name
          </label>
          <input type="text"
                 id="e-name"
                 name="name"
                 placeholder="Your name"
                 required
                 class="bg-[#1a1209] border border-[#3a2a18] rounded-xl
                        px-4 py-3 text-[#f0e8d8] text-sm
                        placeholder-[#4a3520] focus:outline-none
                        focus:border-gold transition-colors w-full" />
        </div>

        <div class="flex flex-col gap-1.5">
          <label for="e-phone"
                 class="text-xs font-semibold text-muted">
            Phone Number
          </label>
          <input type="tel"
                 id="e-phone"
                 name="phone"
                 placeholder="+91 00000 00000"
                 required
                 class="bg-[#1a1209] border border-[#3a2a18] rounded-xl
                        px-4 py-3 text-[#f0e8d8] text-sm
                        placeholder-[#4a3520] focus:outline-none
                        focus:border-gold transition-colors w-full" />
        </div>

      </div>

      <!-- Email -->
      <div class="flex flex-col gap-1.5 mb-4">
        <label for="e-email"
               class="text-xs font-semibold text-muted">
          Email Address
        </label>
        <input type="email"
               id="e-email"
               name="email"
               placeholder="you@example.com"
               required
               class="bg-[#1a1209] border border-[#3a2a18] rounded-xl
                      px-4 py-3 text-[#f0e8d8] text-sm
                      placeholder-[#4a3520] focus:outline-none
                      focus:border-gold transition-colors w-full" />
      </div>

      <!-- Age -->
      <div class="flex flex-col gap-1.5 mb-4">
        <label for="e-age"
               class="text-xs font-semibold text-muted">
          Your Age
        </label>
        <input type="number"
               id="e-age"
               name="age"
               placeholder="e.g. 20"
               min="6"
               max="70"
               required
               class="bg-[#1a1209] border border-[#3a2a18] rounded-xl
                      px-4 py-3 text-[#f0e8d8] text-sm
                      placeholder-[#4a3520] focus:outline-none
                      focus:border-gold transition-colors w-full" />
      </div>

      <!-- Course Selection -->
      <div class="flex flex-col gap-1.5 mb-6">
        <label for="e-course"
               class="text-xs font-semibold text-muted">
          Select Program
        </label>
        <select id="e-course"
                name="course"
                required
                class="bg-[#1a1209] border border-[#3a2a18] rounded-xl
                       px-4 py-3 text-[#f0e8d8] text-sm
                       focus:outline-none focus:border-gold
                       transition-colors w-full cursor-pointer"
                style="appearance: none;
                       background-image: url('data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%2712%27 height=%278%27 viewBox=%270 0 12 8%27%3E%3Cpath fill=%27%239e8c72%27 d=%27M6 8L0 0h12z%27/%3E%3C/svg%3E');
                       background-repeat: no-repeat;
                       background-position: right 1rem center;">
          <option value="" disabled selected
                  style="background: #261c0e; color: #9e8c72;">
            Choose a program...
          </option>
          <option value="beginner"
                  style="background: #261c0e; color: #f0e8d8;">
            Beginner Guitar Classes
          </option>
          <option value="advanced"
                  style="background: #261c0e; color: #f0e8d8;">
            Advanced & Lead Guitar
          </option>
          <option value="online"
                  style="background: #261c0e; color: #f0e8d8;">
            Online Live Sessions
          </option>
          <option value="oneone"
                  style="background: #261c0e; color: #f0e8d8;">
            One-on-One Coaching
          </option>
        </select>
      </div>

      <!-- Submit Button -->
      <button type="submit"
              class="w-full bg-gold text-white font-semibold text-sm
                     py-3 rounded-full hover:bg-gold-light
                     hover:-translate-y-0.5 transition-all duration-200
                     cursor-pointer">
        Submit Enrollment →
      </button>

    </form>

  </div>

</body>
</html>
